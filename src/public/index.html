<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tableau de bord en temps réel pour suivre le cours du BTC/USDT et gérer des alertes de prix personnalisées.">
  <title>CryptoAlert — Suivi BTC/USDT en Temps Réel</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>₿</text></svg>">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="app-container">

    <!-- ─── Header ─────────────────────────────────────────────────────── -->
    <header class="app-header">
      <div class="logo-area">
        <span class="logo-icon">₿</span>
        <h1>CryptoAlert</h1>
      </div>
      <div id="connStatus" class="status-badge disconnected">
        <span class="status-dot"></span>
        <span class="status-text">CONNEXION…</span>
      </div>
    </header>

    <!-- ─── Dashboard Grid ─────────────────────────────────────────────── -->
    <main class="dashboard-grid">

      <!-- Hero Card — Live Price -->
      <section class="card hero-card" aria-label="Prix actuel du BTC">
        <span class="card-label">BTC / USDT</span>
        <div id="btcPrice" class="price-display">$—</div>
        <div id="btcTrend" class="trend-indicator neutral">
          <span class="trend-arrow">─</span>
          <span class="trend-pct">0.00%</span>
        </div>
      </section>

      <!-- Chart Card — SVG Line Chart -->
      <section class="card chart-card" aria-label="Graphique de prix">
        <div class="card-header">
          <h3>Évolution du Prix</h3>
          <span class="timeframe">DERNIÈRES 24H</span>
        </div>
        <div class="chart-container">
          <svg id="priceChart" viewBox="0 0 500 200" preserveAspectRatio="none">
            <defs>
              <linearGradient id="chartGradient" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="hsl(263, 80%, 58%)" stop-opacity="0.3"/>
                <stop offset="100%" stop-color="hsl(263, 80%, 58%)" stop-opacity="0.02"/>
              </linearGradient>
            </defs>
            <path id="chartFill" fill="url(#chartGradient)" d=""/>
            <path id="chartLine" fill="none" stroke="hsl(263, 80%, 58%)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d=""/>
          </svg>
        </div>
      </section>

      <!-- Form Card — Create New Alert -->
      <section class="card form-card" aria-label="Créer une alerte">
        <h3>Nouvelle Alerte</h3>
        <form id="alertForm" autocomplete="off">

          <div class="form-group">
            <label for="triggerType">Type de déclencheur</label>
            <div class="trigger-toggle">
              <button type="button" class="btn-toggle active" data-type="above">▲ Hausse</button>
              <button type="button" class="btn-toggle" data-type="below">▼ Baisse</button>
            </div>
          </div>

          <div class="form-group">
            <label for="targetPrice">Prix cible (USD)</label>
            <input type="number" id="targetPrice" placeholder="ex: 70000" min="0" step="any" required>
          </div>

          <button type="submit" class="btn-submit">Créer l'alerte</button>
        </form>
      </section>

      <!-- Alerts Card — Active & Triggered Lists -->
      <section class="card alerts-card" aria-label="Liste des alertes">
        <h3>Mes Alertes</h3>
        <div class="alerts-sections">
          <div>
            <h4>🟢 Actives</h4>
            <ul id="activeAlertList" class="alert-list">
              <li class="empty-msg">Aucune alerte active</li>
            </ul>
          </div>
          <div>
            <h4>🔔 Déclenchées</h4>
            <ul id="triggeredAlertList" class="alert-list">
              <li class="empty-msg">Aucune alerte déclenchée</li>
            </ul>
          </div>
        </div>
      </section>

    </main>

  </div>

  <!-- Toast Notification Container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Frontend JavaScript -->
  <script src="js/app.js"></script>

</body>
</html>
